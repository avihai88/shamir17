<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מעליות שבת - יצחק שמיר 17</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        /* חסימה מוחלטת של גלילה - המערכת מתנהגת כמו אפליקציה סגורה */
        html, body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
        }

        /* "קופסת הקסם" - מחושבת מתמטית לשמור על יחס 9:16 בכל מסך מבלי לחרוג לעולם */
        #app-container {
            width: 100%;
            height: 100%;
            max-width: min(500px, calc(100dvh * (9 / 16)));
            max-height: min(888px, calc(100vw * (16 / 9)));
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 4cqw;
            box-sizing: border-box;
            container-type: inline-size; /* מגדיר את הקופסה כיחידת מידה */
        }

        /* כל המידות (cqw) הן נגזרת מדויקת של הקופסה, כך שהפרופורציה נשמרת תמיד */
        .bsd { position: absolute; top: 2cqw; right: 4cqw; font-size: 3.5cqw; color: #888; z-index: 1000; }
        .viewers { position: absolute; top: 2.5cqw; left: 12cqw; font-size: 3.5cqw; color: #00C851; z-index: 1000; font-weight: bold; }
        
        #authBtn { position: absolute; top: 1.5cqw; left: 2cqw; background: none; border: none; font-size: 5cqw; cursor: pointer; opacity: 0.3; transition: opacity 0.3s; z-index: 1000; padding: 0; margin: 0; }
        #authBtn:hover { opacity: 0.8; }

        .header { margin-top: 6cqw; flex-shrink: 0; }
        h2 { margin: 0 0 2cqw 0; font-size: 6.5cqw; }
        #parasha-line { color: #bb86fc; font-size: 5.5cqw; font-weight: bold; margin-bottom: 2cqw; }
        .shabbat-times { color: #aaaaaa; font-size: 4cqw; margin-bottom: 2cqw; }
        
        #weather-line { color: #4dd0e1; font-size: 4cqw; font-weight: bold; margin-bottom: 2cqw; display: flex; justify-content: center; align-items: center; gap: 1cqw; }
        .weather-temp { direction: ltr; margin-right: 1cqw; }
        
        #clock-line { font-size: 16cqw; font-weight: bold; margin-bottom: 0; line-height: 1; font-variant-numeric: tabular-nums; }
        #gregorian-date { color: #888; font-size: 3.8cqw; font-weight: 500; margin-top: 1cqw; margin-bottom: 3cqw;}

        /* שורת ההודעה: נעולה לשורה אחת, לא נשברת לעולם (nowrap) */
        #info-message { 
            color: #aaaaaa; 
            font-size: 3.6cqw; 
            font-weight: bold; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            height: 5cqw; 
            line-height: 5cqw; 
            margin-bottom: 4cqw; 
            transition: color 0.3s; 
            flex-shrink: 0;
            width: 100%;
        }

        #elevator-container { display: flex; justify-content: center; gap: 4cqw; width: 100%; flex-grow: 1; min-height: 0; }
        
        .elevator-box { 
            background: #1e1e1e; 
            border-radius: 4cqw; 
            padding: 4cqw; 
            flex: 1; 
            box-shadow: 0 1cqw 2cqw rgba(0,0,0,0.3); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between; 
        }
        
        .title { color: #888; font-size: 4.5cqw; margin: 0; }
        .floor { font-size: 26cqw; font-weight: bold; color: #ffffff; direction: ltr; transition: color 0.3s; margin: 0; line-height: 1;}
        .floor.floor-error { color: #ff4444; font-size: 13cqw; }
        
        /* טיימר בעל גובה קבוע ונעול מראש (12cqw) כדי למנוע דחיפה של כפתור הבחירה! */
        .timer-display { 
            height: 12cqw; 
            width: 100%;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            direction: ltr; 
            margin: 1cqw 0;
            font-weight: bold; 
            font-variant-numeric: tabular-nums; 
        }
        .timer-display.active { font-size: 9cqw; color: #00C851; }
        .timer-display.standby { font-size: 4cqw; color: #ffbb33; }
        
        .floor-select-wrap { 
            width: 100%; 
            border-top: 1px solid #333; 
            padding-top: 3cqw; 
            margin-top: auto;
            font-size: 3.5cqw; 
            color: #aaa; 
            text-align: center;
        }
        .floor-select-wrap select { 
            background: #333; 
            color: white; 
            border: 1px solid #bb86fc; 
            border-radius: 1.5cqw; 
            padding: 2cqw; 
            font-family: inherit; 
            font-size: 4cqw; 
            cursor: pointer; 
            outline: none; 
            width: 100%; 
            margin-top: 1cqw;
            box-sizing: border-box;
        }
        
        .developer-credit { margin-top: 3cqw; font-size: 3cqw; color: #666; text-align: center; flex-shrink: 0; }
        .developer-credit a { color: #666; text-decoration: none; transition: color 0.3s; font-family: monospace; }
        .developer-credit a:hover { color: #bb86fc; }

        /* אזור הפיתוח (Popup) */
        #devPanel { 
            display: none; position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            padding: 20px; background: rgba(26,26,26,0.95); border-radius: 10px; border: 1px solid #555; 
            color: #aaaaaa; font-size: 16px; text-align: right; width: 90%; max-width: 400px; 
            z-index: 2000; box-shadow: 0 10px 25px rgba(0,0,0,0.9); box-sizing: border-box;
        }
        #devPanel input[type="text"], #devPanel input[type="date"], #devPanel input[type="time"] { background: #333; color: white; border: 1px solid #555; padding: 8px; border-radius: 5px; font-family: inherit; width: 100%; box-sizing: border-box; margin-bottom: 10px;}
        .dev-btn { background: #3700b3; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s; width: 100%;}
        .dev-btn:hover { background: #6200ea; }
        .dev-btn-danger { background: #cf6679; color: #000; margin-top: 5px;}
        .dev-btn-danger:hover { background: #ff7597; }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="bsd">בס״ד</div>
        <div class="viewers" title="צופים מחוברים כעת">👁️ <span id="uCount">0</span></div>
        <button id="authBtn" title="אזור מפתחים">🔒</button>

        <div class="header">
            <h2>מעליות שבת יצחק שמיר 17</h2>
            <div id="parasha-line">טוען נתונים...</div>
            
            <div class="shabbat-times">
                כניסה: <span id="start-time">--:--</span> | יציאה: <span id="end-time">--:--</span>
            </div>

            <div id="weather-line">מחשב מזג אוויר...</div>

            <div id="clock-line">--:--:--</div>
            <div id="gregorian-date">טוען תאריך...</div>
        </div>

        <div id="info-message">טוען סטטוס מערכת...</div>

        <div id="elevator-container">
            <div class="elevator-box">
                <div class="title">ימין</div>
                <div id="rightFloor" class="floor">--</div>
                <div id="rightTimer" class="timer-display standby"></div>
                <div class="floor-select-wrap">
                    <label>התראה לקומה: </label>
                    <select id="rightFloorSelect"></select>
                </div>
            </div>
            <div class="elevator-box">
                <div class="title">שמאל</div>
                <div id="leftFloor" class="floor">--</div>
                <div id="leftTimer" class="timer-display standby"></div>
                <div class="floor-select-wrap">
                    <label>התראה לקומה: </label>
                    <select id="leftFloorSelect"></select>
                </div>
            </div>
        </div>

        <div class="developer-credit">
            Developed by Avihai Ofir: <a href="mailto:avihai88@gmail.com">avihai88@gmail.com</a>
        </div>

        <div id="devPanel">
            <h3 style="color: #bb86fc; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px;">אזור טכני (מצב בדיקות)</h3>
            <button id="closeDevBtn" style="background:none; border:none; color:white; font-size:1.2em; cursor:pointer; position:absolute; top:15px; left:15px;">✖</button>
            <div style="margin-bottom: 20px;">
                <strong style="color: white;">אפשרות 1: הפעלה אקטיבית</strong><br>
                <label style="display: inline-block; margin-top: 10px; cursor: pointer;">
                    <input type="checkbox" id="overrideToggle"> הפעל מערכת כעת
                </label>
            </div>
            <hr style="border-color: #333; margin: 15px 0;">
            <div>
                <strong style="color: white;">אפשרות 2: סימולציית זמנים</strong><br>
                <input type="date" id="simDate"><br>
                <div style="display:flex; gap:10px;">
                    <input type="time" id="simStart" placeholder="כניסה">
                    <input type="time" id="simEnd" placeholder="יציאה">
                </div>
                <div style="margin-top: 15px;">
                    <button id="applySimBtn" class="dev-btn">הפעל סימולציה</button>
                    <button id="cancelSimBtn" class="dev-btn dev-btn-danger">בטל וחזור לאמת</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // --- הגדרות משתנים לבניינים ---
        // ==========================================
        const BUILDING_ID = "shamir17"; 

        const MINUTES_BEFORE_START = 10;   
        const SYNC_INFO_MINUTES = 15; 
        const SAFETY_REFRESH_OFFSET = 1; 

        const MAX_BUILDING_FLOORS = 24;  
        const RIGHT_CYCLE_SECONDS = 480; 
        const LEFT_CYCLE_SECONDS = 480;  

        const RIGHT_FLOORS_MODE = "odd";  
        const LEFT_FLOORS_MODE = "even";  

        // --- התחברות לשרת המתווך (WebSockets) ---
        const socket = io("https://shamir17.onrender.com", { autoConnect: false }); 
        
        socket.on('connect', () => {
            socket.emit('join_building', BUILDING_ID);
        });

        let shabbatStart = null, shabbatEnd = null;
        let isSimulationActive = false; 

        let rightLastFloor = null;
        let leftLastFloor = null;
        let rightTimerEnd = localStorage.getItem("rightTimerEnd") ? parseInt(localStorage.getItem("rightTimerEnd")) : 0;
        let leftTimerEnd = localStorage.getItem("leftTimerEnd") ? parseInt(localStorage.getItem("leftTimerEnd")) : 0;

        function buildOptionsHTML(mode) {
            let opts = '<option value="">ללא</option>';
            for(let i = MAX_BUILDING_FLOORS; i >= 0; i--) {
                if (i === 0 || mode === "all" || (mode === "even" && i % 2 === 0) || (mode === "odd" && i % 2 !== 0)) {
                    opts += `<option value="${i}">קומה ${i}</option>`;
                }
            }
            return opts;
        }

        function initDropdowns() {
            const rSel = document.getElementById("rightFloorSelect");
            const lSel = document.getElementById("leftFloorSelect");
            
            rSel.innerHTML = buildOptionsHTML(RIGHT_FLOORS_MODE);
            lSel.innerHTML = buildOptionsHTML(LEFT_FLOORS_MODE);

            if(localStorage.getItem("rightUserFloor")) rSel.value = localStorage.getItem("rightUserFloor");
            if(localStorage.getItem("leftUserFloor")) lSel.value = localStorage.getItem("leftUserFloor");

            rSel.addEventListener("change", (e) => {
                localStorage.setItem("rightUserFloor", e.target.value);
                rightTimerEnd = 0; localStorage.setItem("rightTimerEnd", 0);
            });
            lSel.addEventListener("change", (e) => {
                localStorage.setItem("leftUserFloor", e.target.value);
                leftTimerEnd = 0; localStorage.setItem("leftTimerEnd", 0);
            });
        }

        const authBtn = document.getElementById("authBtn");
        const devPanel = document.getElementById("devPanel");
        authBtn.addEventListener('click', () => {
            const pass = prompt("נא להזין סיסמת מפתח:");
            if (pass === "0504300227") {
                devPanel.style.display = "block";
            } else if (pass !== null) alert("סיסמה שגויה");
        });
        
        document.getElementById("closeDevBtn").addEventListener('click', () => {
            devPanel.style.display = "none";
        });

        const overrideCheckbox = document.getElementById("overrideToggle");
        if (localStorage.getItem("testModeActive") === "true") overrideCheckbox.checked = true;
        overrideCheckbox.addEventListener("change", (e) => {
            localStorage.setItem("testModeActive", e.target.checked);
            evaluateSystemState();
        });

        document.getElementById("applySimBtn").addEventListener('click', () => {
            const d = document.getElementById("simDate").value, s = document.getElementById("simStart").value, e = document.getElementById("simEnd").value;
            if (!d || !s || !e) { alert("מלא את כל השדות"); return; }
            shabbatStart = new Date(`${d}T${s}:00`);
            shabbatEnd = new Date(`${d}T${e}:00`);
            isSimulationActive = true;
            const opt = {hour:'2-digit', minute:'2-digit', hour12:false, timeZone:'Asia/Jerusalem'};
            document.getElementById("start-time").innerText = shabbatStart.toLocaleTimeString('he-IL', opt) + " (סימו')";
            document.getElementById("end-time").innerText = shabbatEnd.toLocaleTimeString('he-IL', opt) + " (סימו')";
            document.getElementById("parasha-line").innerText = "מצב סימולציה פעיל";
            document.getElementById("parasha-line").style.color = "#ffbb33";
            evaluateSystemState();
            devPanel.style.display = "none";
            alert("הסימולציה הופעלה");
        });

        document.getElementById("cancelSimBtn").addEventListener('click', () => {
            isSimulationActive = false;
            document.getElementById("parasha-line").style.color = "#bb86fc";
            fetchShabbatTimes(); 
            devPanel.style.display = "none";
            alert("הסימולציה בוטלה");
        });

        function updateClockAndTimers() {
            const now = new Date();
            
            document.getElementById("clock-line").innerText = now.toLocaleTimeString('he-IL', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit', timeZone:'Asia/Jerusalem'});
            const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('gregorian-date').innerText = now.toLocaleDateString('he-IL', dateOptions);
            
            const rSel = document.getElementById("rightFloorSelect").value;
            const rEl = document.getElementById("rightTimer");
            if (rSel === "") {
                rEl.innerText = "";
                rEl.className = "timer-display standby";
            } else if (rightTimerEnd > now.getTime()) {
                let diff = Math.floor((rightTimerEnd - now.getTime()) / 1000);
                let m = String(Math.floor(diff / 60)).padStart(2, '0');
                let s = String(diff % 60).padStart(2, '0');
                rEl.innerText = m + ":" + s;
                rEl.className = "timer-display active";
            } else {
                rEl.innerText = "מחשב זמנים...";
                rEl.className = "timer-display standby";
            }

            const lSel = document.getElementById("leftFloorSelect").value;
            const lEl = document.getElementById("leftTimer");
            if (lSel === "") {
                lEl.innerText = "";
                lEl.className = "timer-display standby";
            } else if (leftTimerEnd > now.getTime()) {
                let diff = Math.floor((leftTimerEnd - now.getTime()) / 1000);
                let m = String(Math.floor(diff / 60)).padStart(2, '0');
                let s = String(diff % 60).padStart(2, '0');
                lEl.innerText = m + ":" + s;
                lEl.className = "timer-display active";
            } else {
                lEl.innerText = "מחשב זמנים...";
                lEl.className = "timer-display standby";
            }
        }
        setInterval(updateClockAndTimers, 1000);
        updateClockAndTimers();

        async function fetchWeather() {
            try {
                const lat = 32.078;
                const lon = 34.847;
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Asia%2FJerusalem`;
                
                const res = await fetch(url);
                const data = await res.json();
                
                const today = new Date();
                let daysUntilSaturday = (6 - today.getDay() + 7) % 7; 
                if (today.getDay() === 6) daysUntilSaturday = 0; 
                
                const maxTemp = Math.round(data.daily.temperature_2m_max[daysUntilSaturday]);
                const minTemp = Math.round(data.daily.temperature_2m_min[daysUntilSaturday]);
                const code = data.daily.weathercode[daysUntilSaturday];
                
                let icon = "🌤️";
                let desc = "מעונן חלקי";
                
                if (code === 0) { icon = "☀️"; desc = "בהיר"; }
                else if (code === 1 || code === 2) { icon = "🌤️"; desc = "מעונן חלקי"; }
                else if (code === 3) { icon = "☁️"; desc = "מעונן"; }
                else if (code >= 45 && code <= 48) { icon = "🌫️"; desc = "ערפילי"; }
                else if (code >= 51 && code <= 67) { icon = "🌧️"; desc = "גשום"; }
                else if (code >= 71 && code <= 77) { icon = "❄️"; desc = "שלג"; }
                else if (code >= 80 && code <= 82) { icon = "🌦️"; desc = "ממטרים"; }
                else if (code >= 95) { icon = "⛈️"; desc = "סופות רעמים"; }

                document.getElementById("weather-line").innerHTML = 
                    `<span title="${desc}">${icon}</span> לשבת: <span class="weather-temp">${maxTemp}°C / ${minTemp}°C</span>`;

            } catch (e) {
                document.getElementById("weather-line").innerHTML = "🌤️ שגיאה בטעינת תחזית";
            }
        }

        async function fetchShabbatTimes(daysOffset = 0) {
            if (isSimulationActive) return; 
            try {
                let targetDate = new Date();
                targetDate.setDate(targetDate.getDate() + daysOffset);
                
                let sunday = new Date(targetDate);
                sunday.setDate(sunday.getDate() - sunday.getDay()); 
                
                const url = `https://www.hebcal.com/shabbat?cfg=json&geonameid=294998&b=18&M=on&gy=${sunday.getFullYear()}&gm=${sunday.getMonth()+1}&gd=${sunday.getDate()}`;
                const res = await fetch(url);
                const data = await res.json();
                
                let holidayName = "";
                let parashaName = "";
                shabbatStart = null;
                shabbatEnd = null;

                for (let item of data.items) {
                    if (item.category === "candles" && !shabbatStart) {
                        shabbatStart = new Date(item.date);
                    }
                    if (item.category === "havdalah") {
                        shabbatEnd = new Date(item.date);
                    }
                    if (item.category === "holiday" && !holidayName) {
                        holidayName = item.hebrew;
                    }
                    if (item.category === "parashat" && !parashaName) {
                        parashaName = item.hebrew;
                    }
                }

                if (shabbatEnd && new Date() > shabbatEnd) { 
                    fetchShabbatTimes(daysOffset + 7); 
                    return; 
                }
                
                let displayTitleArr = [];
                if (holidayName) displayTitleArr.push(holidayName);
                if (parashaName) displayTitleArr.push(parashaName);
                
                document.getElementById("parasha-line").innerText = displayTitleArr.length > 0 ? displayTitleArr.join(" | ") : "שבת קודש";
                
                const opt = {hour:'2-digit', minute:'2-digit', hour12:false, timeZone:'Asia/Jerusalem'};
                if (shabbatStart) document.getElementById("start-time").innerText = shabbatStart.toLocaleTimeString('he-IL', opt);
                if (shabbatEnd) document.getElementById("end-time").innerText = shabbatEnd.toLocaleTimeString('he-IL', opt);
                
                evaluateSystemState();
            } catch (e) { document.getElementById("parasha-line").innerText = "שגיאת נתונים"; }
        }

        function evaluateSystemState() {
            const now = new Date();
            const isOverrideOn = overrideCheckbox.checked;
            let displayStartTime = null;
            if (shabbatStart) displayStartTime = new Date(shabbatStart.getTime() - (MINUTES_BEFORE_START * 60000));

            if (displayStartTime && shabbatStart && !isSimulationActive && !isOverrideOn) {
                const refreshTriggerTime = new Date(displayStartTime.getTime() + (SAFETY_REFRESH_OFFSET * 60000));
                const todayKey = "safetyRefreshDone_" + now.toDateString();
                
                if (now >= refreshTriggerTime && now < shabbatStart && localStorage.getItem(todayKey) !== "true") {
                    localStorage.setItem(todayKey, "true");
                    location.reload();
                    return; 
                }
            }

            const isVisibleWindow = (displayStartTime && shabbatEnd && now >= displayStartTime && now <= shabbatEnd);
            const infoMsg = document.getElementById("info-message");
            
            if (!socket.connected) socket.connect();

            if (isVisibleWindow || isOverrideOn) {
                if (shabbatStart && now < shabbatStart && !isOverrideOn) {
                    infoMsg.innerText = `שימו לב: מצב המעליות העדכני יחל כ-${SYNC_INFO_MINUTES} דקות לאחר כניסת השבת`;
                    infoMsg.style.color = "#ffbb33";
                } else {
                    infoMsg.innerText = "● מערכת מעליות שבת פעילה בזמן אמת";
                    infoMsg.style.color = "#00C851";
                }
            } else {
                infoMsg.innerText = `מעליות השבת יפעלו אוטומטית בשבת | התצוגה פעילה למעקב רציף`;
                infoMsg.style.color = "#aaaaaa";
            }
        }

        // --- האזנה לאירועים מהשרת ---
        socket.on('viewers_count', (count) => {
            document.getElementById("uCount").innerText = count;
        });

        socket.on('elevator_update', (data) => {
            const payload = data.floor;
            let val = (payload === "-99") ? "תקלה" : (payload === "-1") ? "⬇️" : (payload === "-2") ? "⬆️" : payload;
            
            if (data.side === 'left') {
                const el = document.getElementById("leftFloor");
                el.innerText = val;
                if (payload === "-99") {
                    el.className = "floor floor-error";
                } else {
                    el.className = "floor";
                }

                const selected = document.getElementById("leftFloorSelect").value;
                if (selected !== "" && leftLastFloor === selected && payload !== selected) {
                    leftTimerEnd = Date.now() + (LEFT_CYCLE_SECONDS * 1000);
                    localStorage.setItem("leftTimerEnd", leftTimerEnd);
                }
                leftLastFloor = payload;
            } 
            else {
                const el = document.getElementById("rightFloor");
                el.innerText = val;
                if (payload === "-99") {
                    el.className = "floor floor-error";
                } else {
                    el.className = "floor";
                }

                const selected = document.getElementById("rightFloorSelect").value;
                if (selected !== "" && rightLastFloor === selected && payload !== selected) {
                    rightTimerEnd = Date.now() + (RIGHT_CYCLE_SECONDS * 1000);
                    localStorage.setItem("rightTimerEnd", rightTimerEnd);
                }
                rightLastFloor = payload;
            }
        });

        initDropdowns();
        fetchShabbatTimes();
        fetchWeather();
        setInterval(fetchWeather, 3 * 60 * 60 * 1000); 
        setInterval(evaluateSystemState, 20000); 
    </script>
</body>
</html>
